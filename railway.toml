[build]
builder = "nixpacks"

[deploy]
startCommand = "python manage.py migrate && gunicorn customer_portal.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120 --log-level info"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
